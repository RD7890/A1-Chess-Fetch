name: Build & Release APK

on:
  push:
    branches:
      - main
      - dev
      - "release/**"
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Debug & Release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "adopt"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Compute version
        id: version
        run: |
          BUILD=${{ github.run_number }}
          # Try to get latest tag; fall back to 1.0.0
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          SEMVER="${TAG#v}"
          MAJOR=$(echo $SEMVER | cut -d. -f1)
          MINOR=$(echo $SEMVER | cut -d. -f2)
          PATCH=$(echo $SEMVER | cut -d. -f3)
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version_name=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD"   >> $GITHUB_OUTPUT
          echo "Version: $VERSION  Build: $BUILD"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p signing
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using provided keystore"
            echo "$KEYSTORE_BASE64" | base64 -d > signing/signing-key.jks
          else
            echo "Generating ephemeral debug keystore for CI"
            keytool -genkeypair \
              -alias chessfetch \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -keystore signing/signing-key.jks \
              -storepass chessfetch123 \
              -keypass  chessfetch123 \
              -dname "CN=ChessFetch, OU=CI, O=RohanDora, L=India, S=Maharashtra, C=IN"
            echo "SIGNING_KEY_ALIAS=chessfetch"        >> $GITHUB_ENV
            echo "SIGNING_STORE_PASSWORD=chessfetch123" >> $GITHUB_ENV
            echo "SIGNING_KEY_PASSWORD=chessfetch123"   >> $GITHUB_ENV
          fi

      - name: Write local.properties
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD || env.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS || env.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD || env.SIGNING_KEY_PASSWORD }}
        run: |
          echo "signing.storeFile=../signing/signing-key.jks"  >> local.properties
          echo "signing.storePassword=${SIGNING_STORE_PASSWORD}">> local.properties
          echo "signing.keyAlias=${SIGNING_KEY_ALIAS}"          >> local.properties
          echo "signing.keyPassword=${SIGNING_KEY_PASSWORD}"    >> local.properties

      - name: Build Debug APK
        env:
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: ./gradlew :app:assembleDebug

      - name: Build Release APK
        env:
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          SIGNING_STORE_FILE: "../signing/signing-key.jks"
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD || env.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS || env.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD || env.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Rename APKs
        id: rename
        run: |
          VERSION=${{ steps.version.outputs.version_name }}
          BUILD=${{ steps.version.outputs.build_number }}
          TAG="v${VERSION}-build.${BUILD}"

          DEBUG_SRC="app/build/outputs/apk/debug/app-debug.apk"
          RELEASE_SRC="app/build/outputs/apk/release/app-release.apk"

          DEBUG_OUT="ChessFetch-${TAG}-debug.apk"
          RELEASE_OUT="ChessFetch-${TAG}-release.apk"

          mv "$DEBUG_SRC"   "$DEBUG_OUT"
          mv "$RELEASE_SRC" "$RELEASE_OUT"

          echo "debug_apk=$DEBUG_OUT"     >> $GITHUB_OUTPUT
          echo "release_apk=$RELEASE_OUT" >> $GITHUB_OUTPUT
          echo "tag=$TAG"                 >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rename.outputs.tag }}
          name: "Chess Fetch ${{ steps.version.outputs.version_name }} (Build #${{ steps.version.outputs.build_number }})"
          body: |
            ## Chess Fetch — Automated Build

            | Field   | Value |
            |---------|-------|
            | Version | `${{ steps.version.outputs.version_name }}` |
            | Build   | `#${{ steps.version.outputs.build_number }}` |
            | Branch  | `${{ github.ref_name }}` |
            | Commit  | `${{ github.sha }}` |

            ### Downloads
            - **Release APK** — signed, minified (recommended)
            - **Debug APK** — debuggable build

            > Release builds are signed with an ephemeral CI keystore unless `KEYSTORE_BASE64` secret is set.
          draft: false
          prerelease: ${{ github.ref_name != 'main' }}
          files: |
            ${{ steps.rename.outputs.release_apk }}
            ${{ steps.rename.outputs.debug_apk }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
